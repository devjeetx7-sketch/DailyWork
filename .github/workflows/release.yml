name: Build & Release APK

on:
  push:
    tags:
      - 'v*'          # Triggers on tags like v1.0.0, v1.1.0

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts') }}

      - name: Decode google-services.json
        run: |
          if [ -z "${{ secrets.GOOGLE_SERVICES_JSON }}" ]; then
            echo "Google Services JSON secret is empty. Using a dummy file."
            cat << 'EOF' > app/google-services.json
          {
            "project_info": { "project_number": "811601656329", "project_id": "crovian-2ae30" },
            "client": [ {
                "client_info": { "mobilesdk_app_id": "1:811601656329:android:1234567890abcdef", "android_client_info": { "package_name": "com.crovian.ai" } },
                "api_key": [ { "current_key": "dummy_api_key_for_build" } ]
            } ]
          }
          EOF
          else
            echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 --decode > app/google-services.json
          fi

      - name: Decode Keystore
        run: |
          if [ -z "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "Keystore base64 secret is empty. Generating a dummy keystore."
            if [ ! -f "app/keystore.jks" ]; then
              keytool -genkey -v -keystore app/keystore.jks -keyalg RSA -keysize 2048 -validity 10000 -alias attendance_key -storepass 123456 -keypass 123456 -dname "CN=Dummy, OU=Dummy, O=Dummy, L=Dummy, ST=Dummy, C=US"
            else
              echo "Dummy keystore already exists."
            fi
          else
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/keystore.jks
          fi

      - name: Build Release APK
        env:
          KEYSTORE_PATH: keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD || '123456' }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS || 'attendance_key' }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD || '123456' }}
        run: ./gradlew assembleRelease

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: app/build/outputs/apk/release/*.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/*.apk
          name: "Release ${{ github.ref_name }}"
          body: |
            ## Attendance App ${{ github.ref_name }}

            ### What's New
            - Employee Attendance Tracking
            - Advance Payment Management
            - Monthly Payroll Reports (PDF + CSV)
            - Google Sign-In

            ### Download
            Download the APK below and install on your Android device.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
